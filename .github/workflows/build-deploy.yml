name: Build and Deploy
on:
  pull_request: 
    types: 
      - opened
      - synchronize
  push:
    branches:
      - main
jobs:
  Build:
    runs-on: ubuntu-latest
    if: github.event_name ==  'pull_request'
    steps:
      - name: Build step
        run: echo "Building the app"
  Deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - name: Deploy the app
        run: echo " Deploying the app"
      
