name: inputs variable
on: 
  workflow_dispatch:
    inputs:
      environment: 
        description: choose environment to display
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
      artifact_tag:
        description: Choose Git Tag to deploy
        required: true
jobs:
  inputs_demo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the APP
        run: echo "Deploying the ${{inputs.artifact_tag}} application to ${{inputs.environment }}"
    
    
    
